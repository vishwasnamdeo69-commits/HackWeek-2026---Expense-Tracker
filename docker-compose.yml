version: '3.9'

services:
  ledgerflow:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      - APP_NAME=${APP_NAME:-LedgerFlow}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_THEME=${APP_THEME:-dark}
      - APP_PORT=${APP_PORT:-8080}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
